on:
  workflow_dispatch:
    push:
      branches: ["main"]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv pip install --system pyinstaller playwright eel tqdm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-browsers
        with:
          path: |
            ~/.cache/ms-playwright
            ~/AppData/Local/ms-playwright
          key: playwright-${{ matrix.os }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: playwright-${{ matrix.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-browsers.outputs.cache-hit != 'true' && runner.os == 'Linux'
        run: |
          playwright install
          playwright install-deps

      - name: Install Playwright browsers (non-Linux)
        if: steps.playwright-browsers.outputs.cache-hit != 'true' && runner.os != 'Linux'
        run: playwright install

      - name: Build (parallel)
        shell: bash
        run: |
          pyinstaller --onefile --distpath dist --workpath build/scraper scraper.py &
          pyinstaller --onefile --distpath dist --workpath build/search search.py &
          pyinstaller --onefile --distpath dist --workpath build/setup setup.py &
          pyinstaller --onefile --distpath dist --workpath build/convert convert-to-csv.py &
          pyinstaller --onefile --distpath dist --workpath build/main --add-data "web:web" main.py &
          wait

      - name: Copy settings file
        shell: bash
        run: |
          cp settings.example.json dist/ 2>/dev/null || echo "Warning: settings.example.json not found, skipping"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: executables-${{ matrix.os }}
          path: dist/*
