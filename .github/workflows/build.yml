name: Build All OSs
on:
  workflow_dispatch:
    push:
      branches: ["main"]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv pip install --system pyinstaller playwright eel tqdm

      - name: Install Playwright browsers
        run: |
          playwright install
          playwright install-deps
        if: runner.os == 'Linux'

      - name: Install Playwright browsers (non-Linux)
        run: playwright install
        if: runner.os != 'Linux'

      - name: Build (parallel)
        shell: bash
        run: |
          pyinstaller --onefile --distpath dist --workpath build/scraper scraper.py &
          pyinstaller --onefile --distpath dist --workpath build/search search.py &
          pyinstaller --onefile --distpath dist --workpath build/setup setup.py &
          pyinstaller --onefile --distpath dist --workpath build/convert convert-to-csv.py &
          pyinstaller --onefile --distpath dist --workpath build/main --add-data "web:web" main.py &
          wait
      - name: Copy settings file
        shell: bash
        run: |
          if [ -f "settings.example.json" ]; then
            cp settings.example.json dist/
          else
            echo "Warning: settings.example.json not found, skipping"
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: executables-${{ matrix.os }}
          path: dist/*
